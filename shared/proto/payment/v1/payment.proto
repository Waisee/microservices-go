syntax = "proto3";

package payment.v1;

option go_package = "github.com/waisee/microservices-go/shared/pkg/proto/payment/v1;paymentv1";

// PaymentService обрабатывает оплату заказов
service PaymentService {
  // PayOrder обрабатывает оплату заказа
  rpc PayOrder(PayOrderRequest) returns (PayOrderResponse);
}

// Способ оплаты
enum PaymentMethod {
  // Неопределенный метод оплаты
  PAYMENT_METHOD_UNSPECIFIED = 0;

  // Оплата картой
  PAYMENT_METHOD_CARD = 1;

  // Оплата через СБП
  PAYMENT_METHOD_SBP = 2;

  // Оплата кредитной картой
  PAYMENT_METHOD_CREDIT_CARD = 3;

  // Оплата деньгами инвестора
  PAYMENT_METHOD_INVESTOR_MONEY = 4;
}

// Запрос на оплату заказа
// PAYMENT_METHOD_UNSPECIFIED недопустим и должен отклоняться валидатором
message PayOrderRequest {
  // UUID заказа
  string order_uuid = 1;

  // Метод оплаты
  PaymentMethod payment_method = 2;
}

// Ответ на запрос на оплату
message PayOrderResponse{
  // UUID транзакции
  string transaction_uuid = 1;

}